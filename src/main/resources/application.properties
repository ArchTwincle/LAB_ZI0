# ????????? ??????? ? HTTPS
server.port=8443
server.ssl.enabled=true

# SSL keystore
server.ssl.key-store=classpath:staviskiy_server.jks
server.ssl.key-store-type=JKS
server.ssl.key-alias=staviskiyServer
server.ssl.key-store-password=${SSL_PASSWORD}

# ????????? ??????????? PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/tourismdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ????????? JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ????????? JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration=3600000
jwt.refresh-expiration=604800000

# ????????? ?????? ??? ??? ????????
signature.key-store=classpath:signing.p12
signature.key-store-password=${SIGNATURE_KEY_STORE_PASSWORD}
signature.key-password=${SIGNATURE_KEY_PASSWORD}
signature.key-alias=${SIGNATURE_KEY_ALIAS}
signature.key-store-type=PKCS12
signature.algorithm=SHA256withRSA