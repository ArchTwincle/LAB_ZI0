name: Java CI with Maven and SSL

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Decode Keystore
      run: |
        mkdir -p src/main/resources
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > src/main/resources/staviskiy_server.jks

    - name: Build with Maven

      run: mvn clean package
      env:
        SSL_STORE_PASSWORD: ${{ secrets.SSL_STORE_PASSWORD }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tourism-service-secure
        path: target/*.jar
